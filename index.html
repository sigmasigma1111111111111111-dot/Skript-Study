<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Script Study - Rehearsal Tool</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", -apple-system, sans-serif;
        background-color: #fcfcfc;
        color: #111827;
      }
      #root {
        height: 100vh;
        width: 100vw;
      }
      .loader-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 100%;
        background-color: #fcfcfc;
      }
      .fallback-container {
        text-align: center;
        max-width: 400px;
        padding: 40px;
        animation: fadeIn 0.8s ease-out;
      }
      .logo-mark {
        width: 48px;
        height: 48px;
        background: #111827;
        border-radius: 6px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        font-weight: 900;
      }
      .badge {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #6b7280;
        border: 1px solid #e5e7eb;
        padding: 4px 12px;
        border-radius: 100px;
        display: inline-block;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      p {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.6;
      }
      .loader {
        width: 20px;
        height: 20px;
        border: 2px solid #e5e7eb;
        border-top-color: #111827;
        border-radius: 50%;
        margin: 32px auto 0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-wrapper">
        <div class="fallback-container">
          <div class="logo-mark">SS</div>
          <h1>Initializing environment</h1>
          <p>
            Loading...
          </p>
          <div class="loader"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
